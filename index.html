<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ONLINE FPS ARENA - 멀티플레이어 배틀</title>
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <script src="[https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js](https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js)"></script>
    <script src="[https://cdn.socket.io/4.7.2/socket.io.min.js](https://cdn.socket.io/4.7.2/socket.io.min.js)"></script>
    <style>
        body { margin: 0; overflow: hidden; user-select: none; font-family: 'Pretendard', 'Noto Sans KR', sans-serif; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(255, 255, 255, 0.9); }
        #crosshair::before { top: 4px; left: -5px; width: 20px; height: 2px; }
        #crosshair::after { top: -5px; left: 4px; width: 2px; height: 20px; }
        #damage-flash { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; transition: all 0.1s; z-index: 5; }
        .hit { background-color: rgba(239, 68, 68, 0.4); border: 15px solid rgba(239, 68, 68, 0.6); }
    </style>
</head>
<body class="bg-gray-950 text-white">

    <div id="damage-flash"></div>

    <div class="absolute top-0 left-0 w-full p-4 flex flex-col md:flex-row gap-4 justify-between items-center md:items-start pointer-events-none z-10">
        <div class="bg-black/70 p-3 rounded-xl border border-gray-800 shadow-2xl">
            <div class="text-xs text-gray-500 font-bold uppercase tracking-wider">구역</div>
            <div id="game-status" class="text-xl font-black text-amber-400">대기실 (LOBBY)</div>
        </div>

        <div class="bg-black/70 p-3 rounded-xl border border-gray-800 text-center min-w-[200px] shadow-2xl">
            <div class="text-xs text-gray-400 font-bold uppercase tracking-wider">1v1 배틀 패드 상태</div>
            <div id="pad-status-text" class="text-lg font-black text-green-400 animate-pulse">대기 중 (0 / 2)</div>
            <div class="text-[10px] text-gray-500">노란 발판 위로 올라가면 매칭이 수락됩니다.</div>
        </div>

        <div class="bg-black/70 p-3 rounded-xl border border-gray-800 text-right shadow-2xl">
            <div class="text-xs text-gray-500 font-bold tracking-wider">내 전적</div>
            <div class="text-xl font-black text-white"><span id="score-win" class="text-green-400">0</span>승 <span id="score-lose" class="text-red-400">0</span>패</div>
        </div>
    </div>

    <div id="crosshair"></div>

    <div class="absolute bottom-6 left-1/2 -translate-x-1/2 w-full max-w-2xl px-4 pointer-events-none z-10 flex flex-col gap-3">
        <div id="hp-versus-container" class="flex justify-between items-center bg-black/70 p-3 rounded-2xl border border-white/10 opacity-0 transition-opacity duration-300">
            <div class="w-2/5">
                <div class="flex justify-between text-xs font-bold mb-1"><span class="text-blue-400">나</span> <span id="my-hp-text">100 HP</span></div>
                <div class="w-full bg-gray-800 h-3 rounded-full overflow-hidden"><div id="my-hp-bar" class="bg-blue-500 h-full w-full"></div></div>
            </div>
            <div class="font-black italic text-rose-500 text-2xl tracking-tighter">VS</div>
            <div class="w-2/5 text-right">
                <div class="flex justify-between text-xs font-bold mb-1 flex-row-reverse"><span class="text-red-400">상대</span> <span id="enemy-hp-text">100 HP</span></div>
                <div class="w-full bg-gray-800 h-3 rounded-full overflow-hidden"><div id="enemy-hp-bar" class="bg-red-500 h-full w-full float-right"></div></div>
            </div>
        </div>

        <div class="flex justify-between items-end">
            <div class="bg-black/70 p-3 rounded-lg text-xs text-gray-300">
                <span class="text-amber-400 font-bold">WASD</span>: 이동 | <span class="text-amber-400 font-bold">SPACE</span>: 점프 | <span class="text-amber-400 font-bold">R</span>: 장전 | <span class="text-amber-400 font-bold">클릭</span>: 사격
            </div>
            <div class="bg-black/90 px-6 py-3 rounded-xl border-2 border-amber-500 flex items-center gap-4 shadow-inner">
                <div class="text-right text-4xl font-black text-amber-400 tabular-nums"><span id="current-ammo">30</span>/30</div>
                <div class="text-[11px] text-gray-400 font-bold uppercase tracking-widest">RIFLE M4A1</div>
            </div>
        </div>
    </div>

    <div id="intro-modal" class="absolute top-0 left-0 w-full h-full bg-black/95 flex flex-col justify-center items-center z-50 transition-opacity duration-500">
        <h1 class="text-5xl font-black text-amber-500 mb-8 tracking-wider">ONLINE FPS ARENA</h1>
        <button id="start-btn" class="bg-amber-500 hover:bg-amber-600 text-black font-extrabold py-4 px-10 rounded-2xl text-xl transition-all active:scale-95 pointer-events-auto shadow-lg">
            게임 서버 접속하기
        </button>
    </div>

    <div id="canvas-container"></div>

    <script>
        // ⚠️ 내 진짜 렌더 서버 주소가 맞는지 확인하세요!
        const socket = io('[https://online-fps-server.onrender.com](https://online-fps-server.onrender.com)'); 

        const PLAYER_SPEED = 0.12;
        const JUMP_FORCE = 0.08;
        const GRAVITY = 0.0035;
        const PLAYER_HEIGHT = 1.6;
        const DAMAGE_PER_SHOT = 6.7; // 15방 수명용 데미지 설정

        let scene, camera, renderer;
        let keys = {};
        let otherPlayers = {}; 
        
        let padMesh;
        const padRadius = 2.0;
        const padPos = { x: 0, z: 4 }; // 단일 매칭 발판 위치
        
        let gameMode = 'lobby'; 
        let currentRoomId = null;
        let myRole = null;
        let opponentId = null;
        let isPlayerReady = false;

        let player = {
            hp: 100,
            ammo: 30,
            maxAmmo: 30,
            isReloading: false,
            pos: new THREE.Vector3(0, PLAYER_HEIGHT, 12), 
            velocity: new THREE.Vector3(),
            isGrounded: true,
            isShooting: false,
            lastShotTime: 0,
            shootDelay: 100 // 연사 속도 살짝 상향
        };

        let gunModel;
        let isLocked = false;
        const pitchObject = new THREE.Object3D();
        const yawObject = new THREE.Object3D();

        const startBtn = document.getElementById('start-btn');
        const introModal = document.getElementById('intro-modal');
        const currentAmmoEl = document.getElementById('current-ammo');
        const myHpBar = document.getElementById('my-hp-bar');
        const myHpText = document.getElementById('my-hp-text');
        const enemyHpBar = document.getElementById('enemy-hp-bar');
        const enemyHpText = document.getElementById('enemy-hp-text');
        const versusContainer = document.getElementById('hp-versus-container');
        const gameStatusEl = document.getElementById('game-status');
        const damageFlashEl = document.getElementById('damage-flash');
        const scoreWinEl = document.getElementById('score-win');
        const scoreLoseEl = document.getElementById('score-lose');
        const padStatusTextEl = document.getElementById('pad-status-text');

        // 구조물 목록 관리를 위한 배열
        let obstacles = [];

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f172a); // 깊은 네이비 배경
            scene.fog = new THREE.FogExp2(0x0f172a, 0.012); // 안개 효과 상향

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            pitchObject.add(camera);
            yawObject.add(pitchObject);
            yawObject.position.copy(player.pos);
            scene.add(yawObject);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true; // 그림자 활성화
            renderer.shadowMap.type = THREE.PCFSoftShadowMap; // 부드러운 그림자
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 조명 설정 업그레이드
            scene.add(new THREE.AmbientLight(0x404040, 0.6)); // 따뜻한 환경광

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(10, 30, 10);
            dirLight.castShadow = true; // 그림자 생성 광원
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            scene.add(dirLight);

            // 대기실에 분위기 있는 호박색 포인트 조명 추가
            const lobbyLight = new THREE.PointLight(0xf59e0b, 1, 15);
            lobbyLight.position.set(0, 4, 10);
            scene.add(lobbyLight);

            buildLobbyAndArena();
            createPlayerGun();
            setupNetworkingEvents();

            window.addEventListener('resize', onWindowResize);
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            document.addEventListener('mousemove', onMouseMove);
            
            document.addEventListener('mousedown', (e) => { if (isLocked && e.button === 0) player.isShooting = true; });
            document.addEventListener('mouseup', (e) => { if (e.button === 0) player.isShooting = false; });
            document.addEventListener('pointerlockchange', () => { isLocked = (document.pointerLockElement === document.body); });

            startBtn.addEventListener('click', () => {
                document.body.requestPointerLock();
                introModal.style.opacity = '0';
                setTimeout(() => introModal.style.display = 'none', 500);
            });
        }

        function setupNetworkingEvents() {
            socket.on('currentPlayers', (players) => {
                Object.keys(players).forEach((id) => {
                    if (id !== socket.id) spawnOtherPlayerMesh(id, players[id].pos);
                });
            });

            socket.on('newPlayer', (playerInfo) => { spawnOtherPlayerMesh(playerInfo.id, playerInfo.pos); });

            socket.on('playerMoved', (playerInfo) => {
                if (otherPlayers[playerInfo.id]) {
                    otherPlayers[playerInfo.id].position.copy(playerInfo.pos);
                    otherPlayers[playerInfo.id].rotation.y = playerInfo.rotY;
                }
            });

            socket.on('readyStatusUpdate', (statusData) => {
                // 단일 패드 서버 데이터 형식에 맞춰 업데이트
                const count = typeof statusData === 'object' ? (statusData['A'] || 0) : statusData;
                if (count > 0) {
                    padStatusTextEl.innerText = `매칭 중 (${count} / 2)`;
                    padStatusTextEl.className = "text-lg font-black text-amber-400 animate-pulse";
                } else {
                    padStatusTextEl.innerText = `대기 중 (0 / 2)`;
                    padStatusTextEl.className = "text-lg font-black text-green-400";
                }
            });

            socket.on('matchFound', (data) => {
                currentRoomId = data.roomId;
                myRole = data.role;
                opponentId = data.opponentId;
                gameMode = 'match';

                gameStatusEl.innerText = `배틀 아레나 (BATTLE ARENA)`;
                gameStatusEl.className = "text-xl font-black text-rose-500 animate-pulse";
                versusContainer.classList.remove('opacity-0');

                if (myRole === 'p1') {
                    yawObject.position.set(0, PLAYER_HEIGHT, -22);
                    yawObject.rotation.y = 0;
                } else {
                    yawObject.position.set(0, PLAYER_HEIGHT, -48);
                    yawObject.rotation.y = Math.PI; 
                }
                
                player.hp = 100;
                player.ammo = player.maxAmmo;
                currentAmmoEl.innerText = player.ammo;
                
                myHpBar.style.width = '100%';
                myHpText.innerText = '100 HP';
                enemyHpBar.style.width = '100%';
                enemyHpText.innerText = '100 HP';
            });

            socket.on('opponentShoot', (data) => { renderTracerTrail(data.start, data.end, 0xef4444); });

            socket.on('damaged', (data) => {
                player.hp = data.currentHp;
                const percentage = Math.ceil(player.hp);
                myHpBar.style.width = percentage + '%'; 
                myHpText.innerText = `${percentage} HP`; 
                
                damageFlashEl.className = 'hit';
                setTimeout(() => damageFlashEl.className = '', 100);

                if (player.hp <= 0) {
                    socket.emit('matchOver', { winnerId: opponentId, loserId: socket.id });
                }
            });

            socket.on('updateEnemyHP', (data) => {
                const percentage = Math.ceil(data.enemyHp);
                enemyHpBar.style.width = percentage + '%';
                enemyHpText.innerText = `${percentage} HP`;
            });

            socket.on('gameResult', (result) => {
                gameMode = 'lobby';
                versusContainer.classList.add('opacity-0');
                gameStatusEl.innerText = "대기실 (LOBBY)";
                gameStatusEl.className = "text-xl font-black text-amber-400";
                
                if(result === 'win') {
                    scoreWinEl.innerText = parseInt(scoreWinEl.innerText) + 1;
                    showResultAlert("👑 대결 승리!", "text-green-400");
                } else {
                    scoreLoseEl.innerText = parseInt(scoreLoseEl.innerText) + 1;
                    showResultAlert("💀 대결 패배...", "text-red-400");
                }

                yawObject.position.set((Math.random() - 0.5) * 5, PLAYER_HEIGHT, 12);
                yawObject.rotation.set(0, 0, 0);
                isPlayerReady = false;
            });

            socket.on('playerDisconnected', (id) => {
                if (otherPlayers[id]) {
                    scene.remove(otherPlayers[id]);
                    delete otherPlayers[id];
                }
            });
        }

        function buildLobbyAndArena() {
            // 🌈 컬러풀한 재질 정의
            const lobbyFloorMat = new THREE.MeshStandardMaterial({ color: 0x1f2937, roughness: 0.9 }); // 짙은 회색 로비 바닥
            const arenaFloorMat = new THREE.MeshStandardMaterial({ color: 0x2e1065, roughness: 0.7, metalness: 0.2 }); // 보랏빛 아레나 바닥

            const wallMat = new THREE.MeshStandardMaterial({ color: 0x475569 }); // 벽 재질

            // 구조물 재질 목록 (다양한 색상)
            const obsMaterials = [
                new THREE.MeshStandardMaterial({ color: 0x06b6d4, emissive: 0x06b6d4, emissiveIntensity: 0.15 }), // 하늘색 LED 박스
                new THREE.MeshStandardMaterial({ color: 0xec4899 }), // 핑크색 구조물
                new THREE.MeshStandardMaterial({ color: 0x84cc16 }), // 연두색 구조물
                new THREE.MeshStandardMaterial({ color: 0xfacc15 })  // 노란색 구조물
            ];

            // 대기실 바닥
            const lobbyFloor = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), lobbyFloorMat);
            lobbyFloor.rotation.x = -Math.PI / 2;
            lobbyFloor.receiveShadow = true;
            scene.add(lobbyFloor);

            // 전투 아레나 바닥 (크기 확대)
            const arenaFloor = new THREE.Mesh(new THREE.BoxGeometry(45, 1, 45), arenaFloorMat);
            arenaFloor.position.set(0, -0.5, -35);
            arenaFloor.receiveShadow = true;
            scene.add(arenaFloor);

            // 아레나 가장자리 네온 LED 스트립 추가
            const neonGeo = new THREE.BoxGeometry(45, 0.1, 0.1);
            const neonMat = new THREE.MeshStandardMaterial({ color: 0x38bdf8, emissive: 0x38bdf8, emissiveIntensity: 1 });
            const neon1 = new THREE.Mesh(neonGeo, neonMat);
            neon1.position.set(0, 0.05, -12.5);
            scene.add(neon1);
            const neon2 = new THREE.Mesh(neonGeo, neonMat);
            neon2.position.set(0, 0.05, -57.5);
            scene.add(neon2);

            // 🌟 아레나 지형지물 구조물 추가 배치
            const obsConfigs = [
                // p1 진영 근처
                { size: [3, 4, 3], pos: [-8, 2, -20], matIdx: 1 }, // 엄폐벽
                { size: [3, 2, 8], pos: [8, 1, -25], matIdx: 2 },  // 긴 낮은 벽

                // p2 진영 근처
                { size: [3, 4, 3], pos: [8, 2, -50], matIdx: 1 }, // 엄폐벽
                { size: [3, 2, 8], pos: [-8, 1, -45], matIdx: 3 }, // 긴 낮은 벽

                // 중앙 지역 전략 구조물
                { size: [1.5, 6, 1.5], pos: [-12, 3, -35], matIdx: 0 }, // 높은 기둥
                { size: [1.5, 6, 1.5], pos: [12, 3, -35], matIdx: 0 },  // 높은 기둥
                { size: [6, 1, 6], pos: [0, 0.5, -35], matIdx: 0 },     // 중앙 거점 플랫폼 (살짝 높음)
                { size: [2, 3, 2], pos: [0, 2.5, -35], matIdx: 1 }      // 플랫폼 위 엄폐 박스
            ];

            obsConfigs.forEach(config => {
                const geometry = new THREE.BoxGeometry(config.size[0], config.size[1], config.size[2]);
                const material = obsMaterials[config.matIdx].clone(); // 색상 재질 적용
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(config.pos[0], config.pos[1], config.pos[2]);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                
                // 충돌 처리 정보 저장
                mesh.userData = {
                    width: config.size[0],
                    height: config.size[1],
                    depth: config.size[2]
                };
                
                scene.add(mesh);
                obstacles.push(mesh); // 충돌 목록에 추가
            });

            // 오리지널 노란색 배틀 패드 1개 배치
            padMesh = new THREE.Mesh(
                new THREE.CylinderGeometry(padRadius, padRadius, 0.1, 32),
                new THREE.MeshStandardMaterial({ color: 0xfacc15, emissive: 0xfacc15, emissiveIntensity: 0.5 })
            );
            padMesh.position.set(padPos.x, 0.05, padPos.z);
            scene.add(padMesh);
        }

        function spawnOtherPlayerMesh(id, pos) {
            const group = new THREE.Group();
            // 상대방 몸통 색상을 좀 더 선명하게 변경
            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1.8, 0.6), new THREE.MeshStandardMaterial({ color: 0xef4444 }));
            body.position.y = 0.9;
            body.castShadow = true;
            group.add(body);
            // 머리는 노란색 헬멧 느낌
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.7), new THREE.MeshStandardMaterial({ color: 0xfacc15 }));
            head.position.y = 2.1;
            head.castShadow = true;
            group.add(head);

            body.userData = { targetId: id };
            head.userData = { targetId: id };
            group.position.copy(pos);
            scene.add(group);
            otherPlayers[id] = group;
        }

        function createPlayerGun() {
            gunModel = new THREE.Group();
            // 총기 색상을 메탈릭한 스틸 느낌으로
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.15, 1.0), new THREE.MeshStandardMaterial({ color: 0x475569, metalness: 0.8, roughness: 0.3 }));
            gunModel.add(body);
            gunModel.position.set(0.25, -0.2, -0.4); 
            camera.add(gunModel);
        }

        function onKeyDown(e) {
            keys[e.code] = true;
            if (e.code === 'Space' && player.isGrounded && isLocked) {
                player.velocity.y = JUMP_FORCE;
                player.isGrounded = false;
            }
            if (e.code === 'KeyR' && player.ammo < player.maxAmmo && !player.isReloading) {
                reloadPlayerWeapon();
            }
        }
        function onKeyUp(e) { keys[e.code] = false; }
        function onMouseMove(e) {
            if (!isLocked) return;
            yawObject.rotation.y -= e.movementX * 0.002; // 감도 미세 조정
            pitchObject.rotation.x -= e.movementY * 0.002;
            pitchObject.rotation.x = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitchObject.rotation.x));
        }

        function reloadPlayerWeapon() {
            player.isReloading = true;
            currentAmmoEl.innerText = "장전";
            currentAmmoEl.classList.add('animate-pulse', 'text-amber-300');
            setTimeout(() => {
                player.ammo = player.maxAmmo;
                currentAmmoEl.innerText = player.ammo;
                currentAmmoEl.classList.remove('animate-pulse', 'text-amber-300');
                player.isReloading = false;
            }, 1200);
        }

        function handleWeaponShooting() {
            if (!isLocked || player.isReloading || player.ammo <= 0) {
                if(player.ammo <= 0 && isLocked) reloadPlayerWeapon();
                return;
            }
            const now = performance.now();
            if (now - player.lastShotTime < player.shootDelay) return;

            player.lastShotTime = now;
            player.ammo--;
            currentAmmoEl.innerText = player.ammo;

            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);

            // 총구 위치 오프셋 세정
            const startVec = new THREE.Vector3(0.25, -0.15, -0.9).unproject(camera);
            let endVec = new THREE.Vector3();
            raycaster.ray.at(100, endVec);

            // 레이캐스팅 타겟 목록 통합 (상대 플레이어 메시들)
            const targetMeshes = [];
            Object.values(otherPlayers).forEach(p => p.traverse(c => { if(c.isMesh) targetMeshes.push(c); }));
            
            // 구조물도 타겟 목록에 추가 (총알이 벽에 박히는 효과 표현용)
            obstacles.forEach(obs => targetMeshes.push(obs));

            const intersects = raycaster.intersectObjects(targetMeshes);
            if (intersects.length > 0) {
                const hit = intersects[0];
                endVec.copy(hit.point);

                // 🎯 디버깅 포인트: 맞춘 대상이 플레이어인지 확인
                if (gameMode === 'match' && hit.object.userData.targetId) {
                    // 고정 데미지(6.7) 전송 -> 15방 수명 규칙
                    socket.emit('hitPlayer', { targetId: hit.object.userData.targetId, damage: DAMAGE_PER_SHOT });
                }
            }

            renderTracerTrail(startVec, endVec, 0xfacc15); // 노란색 총 궤적
            socket.emit('shoot', { start: startVec, end: endVec });
        }

        function renderTracerTrail(start, end, color) {
            const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.8 });
            const geo = new THREE.BufferGeometry().setFromPoints([start, end]);
            const line = new THREE.Line(geo, mat);
            scene.add(line);
            setTimeout(() => { scene.remove(line); geo.dispose(); mat.dispose(); }, 40); // 궤적 지속 시간 단축
        }

        function updateMainLoopAndPhysics() {
            // 중력 및 점프 물리 엔진
            if (!player.isGrounded) {
                player.velocity.y -= GRAVITY; 
                yawObject.position.y += player.velocity.y;

                // 기본 바닥 충돌 처리
                const floorY = gameMode === 'match' ? 0 : 0; // 로비/아레나 바닥 높이 통일
                if (yawObject.position.y <= PLAYER_HEIGHT + floorY) {
                    yawObject.position.y = PLAYER_HEIGHT + floorY;
                    player.velocity.y = 0;
                    player.isGrounded = true;
                }
            }

            if (!isLocked) return;

            // 이동 방향 벡터 계산
            const moveDir = new THREE.Vector3();
            if (keys['KeyW']) moveDir.z -= 1;
            if (keys['KeyS']) moveDir.z += 1;
            if (keys['KeyA']) moveDir.x -= 1;
            if (keys['KeyD']) moveDir.x += 1;
            moveDir.normalize();

            // 플레이어 시선 방향으로 이동 벡터 회전
            const rotatedDir = moveDir.clone().applyQuaternion(yawObject.quaternion);
            rotatedDir.y = 0; // 수직 이동 차단
            rotatedDir.normalize();
            yawObject.position.addScaledVector(rotatedDir, PLAYER_SPEED);

            // 🌟 벽 및 구조물 충돌 감지 (AABB 방식)
            if (gameMode === 'match') {
                obstacles.forEach(obs => {
                    const obsPos = obs.position;
                    const obsSize = obs.userData;
                    const playerPos = yawObject.position;
                    const playerRadius = 0.5; // 플레이어 충돌 반경

                    // X축 충돌 체크
                    const dx = Math.abs(playerPos.x - obsPos.x);
                    if (dx < (obsSize.width / 2 + playerRadius)) {
                        // Z축 충돌 체크
                        const dz = Math.abs(playerPos.z - obsPos.z);
                        if (dz < (obsSize.depth / 2 + playerRadius)) {
                            // 충돌 발생 시 가장 가까운 면으로 밀어내기
                            const pushX = (obsSize.width / 2 + playerRadius) - dx;
                            const pushZ = (obsSize.depth / 2 + playerRadius) - dz;

                            if (pushX < pushZ) {
                                yawObject.position.x += (playerPos.x > obsPos.x ? pushX : -pushX);
                            } else {
                                yawObject.position.z += (playerPos.z > obsPos.z ? pushZ : -pushZ);
                            }
                        }
                    }
                });
            }

            // 구역 제한 로직
            if (gameMode === 'lobby') {
                // 로비 월드 제한
                yawObject.position.x = Math.max(-14, Math.min(14, yawObject.position.x));
                yawObject.position.z = Math.max(-14, Math.min(14, yawObject.position.z));

                // 단일 매칭 패드 밟았는지 실시간 체크 및 서버 전송
                const distToPad = new THREE.Vector2(yawObject.position.x, yawObject.position.z).distanceTo(new THREE.Vector2(padPos.x, padPos.z));
                const standingOnPad = (distToPad < padRadius);

                if (standingOnPad !== isPlayerReady) {
                    isPlayerReady = standingOnPad;
                    socket.emit('toggleReady', { padId: 'A', isReady: isPlayerReady });
                }
            } else {
                // 아레나 월드 제한 (크기 확대에 따라 조정)
                yawObject.position.x = Math.max(-21, Math.min(21, yawObject.position.x));
                yawObject.position.z = Math.max(-56, Math.min(-14, yawObject.position.z));
            }

            // 서버에 내 위치 및 회전 정보 전송
            socket.emit('playerMovement', { pos: yawObject.position, rotY: yawObject.rotation.y });
        }

        function onWindowResize() { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }
        
        // 결과 알림창 업그레이드 (색상 및 애니메이션 추가)
        function showResultAlert(msg, cssClass) {
            const div = document.createElement('div');
            div.className = `absolute top-1/3 left-1/2 -translate-x-1/2 bg-black/80 px-10 py-5 border border-white/20 text-3xl font-black rounded-2xl pointer-events-none z-50 animate-bounce ${cssClass}`;
            div.innerText = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 2500);
        }

        function animate() {
            requestAnimationFrame(animate);
            updateMainLoopAndPhysics();
            if (player.isShooting) handleWeaponShooting();
            renderer.render(scene, camera);
        }

        window.onload = () => { init(); animate(); };
    </script>
</body>
</html>
