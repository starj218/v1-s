<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ONLINE FPS ARENA - 샷건 업데이트</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { margin: 0; overflow: hidden; user-select: none; font-family: 'Pretendard', 'Noto Sans KR', sans-serif; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(255, 255, 255, 0.9); }
        #crosshair::before { top: 4px; left: -5px; width: 20px; height: 2px; }
        #crosshair::after { top: -5px; left: 4px; width: 2px; height: 20px; }
        #damage-flash { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; transition: all 0.1s; z-index: 5; }
        .hit { background-color: rgba(239, 68, 68, 0.4); border: 15px solid rgba(239, 68, 68, 0.6); }
        
        /* 현재 선택된 무기 슬롯의 활성화 네온 효과 */
        .weapon-slot-active {
            border-color: #f59e0b !important;
            background-color: rgba(245, 158, 11, 0.15) !important;
            box-shadow: inset 0 0 15px rgba(245, 158, 11, 0.3), 0 0 15px rgba(245, 158, 11, 0.2);
        }
        .weapon-slot-active i {
            color: #f59e0b !important;
            filter: drop-shadow(0 0 4px rgba(245, 158, 11, 0.6));
        }
    </style>
</head>
<body class="bg-gray-900 text-white">

    <div id="damage-flash"></div>

    <div class="absolute top-0 left-0 w-full p-4 flex flex-col md:flex-row gap-4 justify-between items-center md:items-start pointer-events-none z-10">
        <div class="bg-black/70 p-3 rounded-xl border border-gray-800 shadow-2xl">
            <div class="text-xs text-gray-500 font-bold uppercase tracking-wider">구역</div>
            <div id="game-status" class="text-xl font-black text-amber-400">대기실 (LOBBY)</div>
        </div>

        <div class="bg-black/70 p-3 rounded-xl border border-gray-800 text-center min-w-[200px] shadow-2xl">
            <div class="text-xs text-gray-400 font-bold uppercase tracking-wider">1v1 배틀 패드 상태</div>
            <div id="pad-status-text" class="text-lg font-black text-green-400">대기 중 (0 / 2)</div>
            <div class="text-[10px] text-gray-500">노란 발판 위로 올라가면 매칭이 수락됩니다.</div>
        </div>

        <div class="bg-black/70 p-3 rounded-xl border border-gray-800 text-right shadow-2xl">
            <div class="text-xs text-gray-500 font-bold tracking-wider">내 전적</div>
            <div class="text-xl font-black text-white"><span id="score-win" class="text-green-400">0</span>승 <span id="score-lose" class="text-red-400">0</span>패</div>
        </div>
    </div>

    <div id="crosshair"></div>

    <div class="absolute bottom-6 left-1/2 -translate-x-1/2 w-full max-w-4xl px-4 pointer-events-none z-10 flex flex-col gap-3">
        <div id="hp-versus-container" class="flex justify-between items-center bg-black/70 p-3 rounded-2xl border border-white/10 opacity-0 transition-opacity duration-300">
            <div class="w-2/5">
                <div class="flex justify-between text-xs font-bold mb-1"><span class="text-blue-400">나</span> <span id="my-hp-text">100 HP</span></div>
                <div class="w-full bg-gray-800 h-3 rounded-full overflow-hidden"><div id="my-hp-bar" class="bg-blue-500 h-full w-full"></div></div>
            </div>
            <div class="font-black italic text-rose-500 text-2xl tracking-tighter">VS</div>
            <div class="w-2/5 text-right">
                <div class="flex justify-between text-xs font-bold mb-1 flex-row-reverse"><span class="text-red-400">상대</span> <span id="enemy-hp-text">100 HP</span></div>
                <div class="w-full bg-gray-800 h-3 rounded-full overflow-hidden"><div id="enemy-hp-bar" class="bg-red-500 h-full w-full float-right"></div></div>
            </div>
        </div>

        <div class="flex flex-col sm:flex-row justify-between items-center sm:items-end gap-4">
            <div class="bg-black/70 p-3 rounded-lg text-xs text-gray-300 self-start sm:self-auto">
                <span class="text-amber-400 font-bold">WASD</span>: 이동 | <span class="text-amber-400 font-bold">휠 스크롤</span>: 무기 교체 | <span class="text-amber-400 font-bold">R</span>: 장전 | <span class="text-amber-400 font-bold">클릭</span>: 공격
            </div>
            
            <div class="flex gap-2 pointer-events-none">
                <div id="slot-rifle" class="bg-black/80 px-3 py-2 rounded-xl border-2 border-gray-700 min-w-[150px] flex items-center justify-between transition-all duration-200 weapon-slot-active">
                    <div class="flex flex-col items-start">
                        <div class="text-[8px] text-gray-400 font-bold tracking-widest">SLOT 1</div>
                        <div class="text-xs font-extrabold text-white mt-0.5">RIFLE M4A1</div>
                        <div class="text-lg font-black text-amber-400 mt-0.5 tabular-nums" id="ammo-display-rifle">30<span class="text-gray-500 text-xs">/30</span></div>
                    </div>
                    <div class="text-xl text-gray-600 pl-2">
                        <i class="fa-solid fa-gun transition-colors duration-200"></i>
                    </div>
                </div>

                <div id="slot-shotgun" class="bg-black/80 px-3 py-2 rounded-xl border-2 border-gray-700 min-w-[150px] flex items-center justify-between transition-all duration-200">
                    <div class="flex flex-col items-start">
                        <div class="text-[8px] text-gray-400 font-bold tracking-widest">SLOT 2</div>
                        <div class="text-xs font-extrabold text-white mt-0.5">PUMP SHOTGUN</div>
                        <div class="text-lg font-black text-amber-400 mt-0.5 tabular-nums" id="ammo-display-shotgun">5<span class="text-gray-500 text-xs">/5</span></div>
                    </div>
                    <div class="text-xl text-gray-600 pl-2">
                        <i class="fa-solid fa-bolt transition-colors duration-200"></i>
                    </div>
                </div>
                
                <div id="slot-knife" class="bg-black/80 px-3 py-2 rounded-xl border-2 border-gray-700 min-w-[150px] flex items-center justify-between transition-all duration-200">
                    <div class="flex flex-col items-start">
                        <div class="text-[8px] text-gray-400 font-bold tracking-widest">SLOT 3</div>
                        <div class="text-xs font-extrabold text-white mt-0.5">TACTICAL KNIFE</div>
                        <div class="text-lg font-black text-gray-400 mt-0.5" id="ammo-display-knife">INF</div>
                    </div>
                    <div class="text-xl text-gray-600 pl-2">
                        <i class="fa-solid fa-screwdriver-wrench rotate-45 transition-colors duration-200"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="intro-modal" class="absolute top-0 left-0 w-full h-full bg-black/95 flex flex-col justify-center items-center z-50 transition-opacity duration-500">
        <h1 class="text-5xl font-black text-amber-500 mb-8 tracking-wider">ONLINE FPS ARENA</h1>
        <button id="start-btn" class="bg-amber-500 hover:bg-amber-600 text-black font-extrabold py-4 px-10 rounded-2xl text-xl transition-all active:scale-95 pointer-events-auto shadow-lg">
            게임 서버 접속하기
        </button>
    </div>

    <div id="canvas-container"></div>

    <script>
        // ⚠️ 내 진짜 렌더 서버 주소가 맞는지 확인하세요!
        const socket = io('https://online-fps-server.onrender.com'); 

        const PLAYER_SPEED = 0.12;
        const JUMP_FORCE = 0.08;
        const GRAVITY = 0.0035;
        const PLAYER_HEIGHT = 1.6;
        
        // 무기 스펙 밸런스 설정
        const DAMAGE_RIFLE = 6.7; 
        const DAMAGE_KNIFE = 35.0; 
        const KNIFE_RANGE = 2.5; 
        const DAMAGE_SHOTGUN_PELLET = 12.0; // 샷건 펠릿당 데미지 (5발 다 맞으면 60)

        let scene, camera, renderer;
        let keys = {};
        let otherPlayers = {}; 
        
        let padMesh;
        const padRadius = 2.0;
        const padPos = { x: 0, z: 4 }; 
        
        let gameMode = 'lobby'; 
        let currentRoomId = null; 
        let myRole = null;
        let opponentId = null;
        let isPlayerReady = false;

        // 무기 목록 정의 (소총 -> 샷건 -> 칼 순서)
        const WEAPONS = ['rifle', 'shotgun', 'knife'];
        let currentWeaponIndex = 0; 
        let currentWeapon = 'rifle'; 

        let player = {
            hp: 100,
            ammo: 30,
            maxAmmo: 30,
            shotgunAmmo: 5,
            maxShotgunAmmo: 5,
            isReloading: false,
            pos: new THREE.Vector3(0, PLAYER_HEIGHT, 12), 
            velocity: new THREE.Vector3(),
            isGrounded: true,
            isShooting: false,
            lastShotTime: 0,
            shootDelay: 100 
        };

        let gunContainer; 
        let rifleMesh, shotgunMesh, knifeMesh;
        let isLocked = false;
        const pitchObject = new THREE.Object3D();
        const yawObject = new THREE.Object3D();

        const startBtn = document.getElementById('start-btn');
        const introModal = document.getElementById('intro-modal');
        
        const slotRifleEl = document.getElementById('slot-rifle');
        const slotShotgunEl = document.getElementById('slot-shotgun');
        const slotKnifeEl = document.getElementById('slot-knife');
        const ammoDisplayRifle = document.getElementById('ammo-display-rifle');
        const ammoDisplayShotgun = document.getElementById('ammo-display-shotgun');

        const myHpBar = document.getElementById('my-hp-bar');
        const myHpText = document.getElementById('my-hp-text');
        const enemyHpBar = document.getElementById('enemy-hp-bar');
        const enemyHpText = document.getElementById('enemy-hp-text');
        const versusContainer = document.getElementById('hp-versus-container');
        const gameStatusEl = document.getElementById('game-status');
        const damageFlashEl = document.getElementById('damage-flash');
        const scoreWinEl = document.getElementById('score-win');
        const scoreLoseEl = document.getElementById('score-lose');
        const padStatusTextEl = document.getElementById('pad-status-text');

        let obstacles = [];

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f172a); 
            scene.fog = new THREE.FogExp2(0x0f172a, 0.012); 

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            pitchObject.add(camera);
            yawObject.add(pitchObject);
            yawObject.position.copy(player.pos);
            scene.add(yawObject);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true; 
            renderer.shadowMap.type = THREE.PCFSoftShadowMap; 
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0x404040, 0.6)); 

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(10, 30, 10);
            dirLight.castShadow = true; 
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            scene.add(dirLight);

            const lobbyLight = new THREE.PointLight(0xf59e0b, 1, 15);
            lobbyLight.position.set(0, 4, 10);
            scene.add(lobbyLight);

            buildLobbyAndArena();
            createFpsWeapons(); 
            setupNetworkingEvents();

            window.addEventListener('resize', onWindowResize);
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            document.addEventListener('mousemove', onMouseMove);
            
            document.addEventListener('wheel', onWindowWheel, { passive: true });
            
            document.addEventListener('mousedown', (e) => { if (isLocked && e.button === 0) player.isShooting = true; });
            document.addEventListener('mouseup', (e) => { if (e.button === 0) player.isShooting = false; });
            document.addEventListener('pointerlockchange', () => { isLocked = (document.pointerLockElement === document.body); });

            startBtn.addEventListener('click', () => {
                document.body.requestPointerLock();
                introModal.style.opacity = '0';
                setTimeout(() => introModal.style.display = 'none', 500);
            });
        }

        function setupNetworkingEvents() {
            socket.on('currentPlayers', (players) => {
                Object.keys(players).forEach((id) => {
                    if (id !== socket.id) spawnOtherPlayerMesh(id, players[id].pos);
                });
            });

            socket.on('newPlayer', (playerInfo) => { spawnOtherPlayerMesh(playerInfo.id, playerInfo.pos); });

            socket.on('playerMoved', (playerInfo) => {
                if (otherPlayers[playerInfo.id]) {
                    otherPlayers[playerInfo.id].position.copy(playerInfo.pos);
                    otherPlayers[playerInfo.id].rotation.y = playerInfo.rotY;
                    otherPlayers[playerInfo.id].visible = true; 

                    const enemyGun = otherPlayers[playerInfo.id].getObjectByName("enemyWeapon_rifle");
                    const enemyShotgun = otherPlayers[playerInfo.id].getObjectByName("enemyWeapon_shotgun");
                    const enemyKnife = otherPlayers[playerInfo.id].getObjectByName("enemyWeapon_knife");
                    
                    if (enemyGun && enemyShotgun && enemyKnife) {
                        enemyGun.visible = (playerInfo.weapon === 'rifle');
                        enemyShotgun.visible = (playerInfo.weapon === 'shotgun');
                        enemyKnife.visible = (playerInfo.weapon === 'knife');
                    }
                } else {
                    spawnOtherPlayerMesh(playerInfo.id, playerInfo.pos);
                }
            });

            socket.on('readyStatusUpdate', (count) => {
                if (count > 0) {
                    padStatusTextEl.innerText = `매칭 중 (${count} / 2)`;
                    padStatusTextEl.className = "text-lg font-black text-amber-400 animate-pulse";
                } else {
                    padStatusTextEl.innerText = `대기 중 (0 / 2)`;
                    padStatusTextEl.className = "text-lg font-black text-green-400";
                }
            });

            socket.on('serverFullError', () => {
                isPlayerReady = false;
                showResultAlert("🚨 서버 정원 초과! 모든 방이 플레이 중입니다.", "text-orange-500 bg-black/90 border-orange-500");
                yawObject.position.set(0, PLAYER_HEIGHT, 12); 
            });

            socket.on('matchFound', (data) => {
                currentRoomId = data.roomId; 
                myRole = data.role;
                opponentId = data.opponentId;
                gameMode = 'match';

                Object.keys(otherPlayers).forEach(id => {
                    if (id !== opponentId) otherPlayers[id].visible = false;
                });

                gameStatusEl.innerText = `배틀 아레나 (BATTLE ARENA)`;
                gameStatusEl.className = "text-xl font-black text-rose-500 animate-pulse";
                versusContainer.classList.remove('opacity-0');

                if (myRole === 'p1') {
                    yawObject.position.set(0, PLAYER_HEIGHT, -22);
                    yawObject.rotation.y = 0;
                } else {
                    yawObject.position.set(0, PLAYER_HEIGHT, -48);
                    yawObject.rotation.y = Math.PI; 
                }
                
                player.hp = 100;
                player.ammo = player.maxAmmo;
                player.shotgunAmmo = player.maxShotgunAmmo;
                
                swapToWeapon('rifle');
                
                myHpBar.style.width = '100%';
                myHpText.innerText = '100 HP';
                enemyHpBar.style.width = '100%';
                enemyHpText.innerText = '100 HP';
            });

            socket.on('opponentShoot', (data) => { 
                if(data.isKnifeAttack) return;
                // 상대방이 샷건을 쐈을 때 다중 궤적 동기화 렌더링
                if (data.isShotgun) {
                    if(data.pellets && data.pellets.length > 0) {
                        data.pellets.forEach(p => {
                            renderTracerTrail(data.start, p, 0xef4444);
                        });
                    }
                } else {
                    renderTracerTrail(data.start, data.end, 0xef4444); 
                }
            });

            socket.on('damaged', (data) => {
                player.hp = data.currentHp;
                const percentage = Math.ceil(player.hp);
                myHpBar.style.width = percentage + '%'; 
                myHpText.innerText = `${percentage} HP`; 
                
                damageFlashEl.className = 'hit';
                setTimeout(() => damageFlashEl.className = '', 100);

                if (player.hp <= 0) {
                    socket.emit('matchOver', { roomId: currentRoomId, winnerId: opponentId, loserId: socket.id });
                }
            });

            socket.on('updateEnemyHP', (data) => {
                const percentage = Math.ceil(data.enemyHp);
                enemyHpBar.style.width = percentage + '%';
                enemyHpText.innerText = `${percentage} HP`;
            });

            socket.on('gameResult', (result) => {
                gameMode = 'lobby';
                versusContainer.classList.add('opacity-0');
                gameStatusEl.innerText = "대기실 (LOBBY)";
                gameStatusEl.className = "text-xl font-black text-amber-400";
                
                Object.keys(otherPlayers).forEach(id => { scene.remove(otherPlayers[id]); });
                otherPlayers = {};

                if(result === 'win') {
                    scoreWinEl.innerText = parseInt(scoreWinEl.innerText) + 1;
                    showResultAlert("👑 대결 승리!", "text-green-400");
                } else {
                    scoreLoseEl.innerText = parseInt(scoreLoseEl.innerText) + 1;
                    showResultAlert("💀 대결 패배...", "text-red-400");
                }

                yawObject.position.set((Math.random() - 0.5) * 5, PLAYER_HEIGHT, 12);
                yawObject.rotation.set(0, 0, 0);
                
                currentRoomId = null;
                opponentId = null;
                myRole = null;
                isPlayerReady = false;
                swapToWeapon('rifle');
            });

            socket.on('playerDisconnected', (id) => {
                if (otherPlayers[id]) {
                    scene.remove(otherPlayers[id]);
                    delete otherPlayers[id];
                }
            });
        }

        function buildLobbyAndArena() {
            const lobbyFloorMat = new THREE.MeshStandardMaterial({ color: 0x1f2937, roughness: 0.9 }); 
            const arenaFloorMat = new THREE.MeshStandardMaterial({ color: 0x2e1065, roughness: 0.7, metalness: 0.2 }); 

            const obsMaterials = [
                new THREE.MeshStandardMaterial({ color: 0x06b6d4, emissive: 0x06b6d4, emissiveIntensity: 0.15 }), 
                new THREE.MeshStandardMaterial({ color: 0xec4899 }), 
                new THREE.MeshStandardMaterial({ color: 0x84cc16 }), 
                new THREE.MeshStandardMaterial({ color: 0xfacc15 })  
            ];

            const lobbyFloor = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), lobbyFloorMat);
            lobbyFloor.rotation.x = -Math.PI / 2;
            lobbyFloor.receiveShadow = true;
            scene.add(lobbyFloor);

            const arenaFloor = new THREE.Mesh(new THREE.BoxGeometry(45, 1, 45), arenaFloorMat);
            arenaFloor.position.set(0, -0.5, -35);
            arenaFloor.receiveShadow = true;
            scene.add(arenaFloor);

            const neonGeo = new THREE.BoxGeometry(45, 0.1, 0.1);
            const neonMat = new THREE.MeshStandardMaterial({ color: 0x38bdf8, emissive: 0x38bdf8, emissiveIntensity: 1 });
            const neon1 = new THREE.Mesh(neonGeo, neonMat);
            neon1.position.set(0, 0.05, -12.5);
            scene.add(neon1);
            const neon2 = new THREE.Mesh(neonGeo, neonMat);
            neon2.position.set(0, 0.05, -57.5);
            scene.add(neon2);

            const obsConfigs = [
                { size: [3, 4, 3], pos: [-8, 2, -20], matIdx: 1 }, 
                { size: [3, 2, 8], pos: [8, 1, -25], matIdx: 2 },  
                { size: [3, 4, 3], pos: [8, 2, -50], matIdx: 1 }, 
                { size: [3, 2, 8], pos: [-8, 1, -45], matIdx: 3 }, 
                { size: [1.5, 6, 1.5], pos: [-12, 3, -35], matIdx: 0 }, 
                { size: [1.5, 6, 1.5], pos: [12, 3, -35], matIdx: 0 },  
                { size: [6, 1, 6], pos: [0, 0.5, -35], matIdx: 0 },     
                { size: [2, 3, 2], pos: [0, 2.5, -35], matIdx: 1 }      
            ];

            obsConfigs.forEach(config => {
                const geometry = new THREE.BoxGeometry(config.size[0], config.size[1], config.size[2]);
                const material = obsMaterials[config.matIdx].clone(); 
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(config.pos[0], config.pos[1], config.pos[2]);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                
                mesh.userData = {
                    width: config.size[0],
                    height: config.size[1],
                    depth: config.size[2]
                };
                
                scene.add(mesh);
                obstacles.push(mesh); 
            });

            padMesh = new THREE.Mesh(
                new THREE.CylinderGeometry(padRadius, padRadius, 0.1, 32),
                new THREE.MeshStandardMaterial({ color: 0xfacc15, emissive: 0xfacc15, emissiveIntensity: 0.5 })
            );
            padMesh.position.set(padPos.x, 0.05, padPos.z);
            scene.add(padMesh);
        }

        function spawnOtherPlayerMesh(id, pos) {
            if (otherPlayers[id]) return;

            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1.8, 0.6), new THREE.MeshStandardMaterial({ color: 0xef4444 }));
            body.position.y = 0.9;
            body.castShadow = true;
            group.add(body);
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.7), new THREE.MeshStandardMaterial({ color: 0xfacc15 }));
            head.position.y = 2.1;
            head.castShadow = true;
            group.add(head);

            const enemyRifle = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.15, 0.9), new THREE.MeshStandardMaterial({ color: 0x475569 }));
            enemyRifle.position.set(0.4, 0.9, -0.4);
            enemyRifle.name = "enemyWeapon_rifle";
            group.add(enemyRifle);

            const enemyShotgun = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.18, 0.8), new THREE.MeshStandardMaterial({ color: 0x78350f }));
            enemyShotgun.position.set(0.4, 0.85, -0.4);
            enemyShotgun.name = "enemyWeapon_shotgun";
            enemyShotgun.visible = false;
            group.add(enemyShotgun);

            const enemyKnife = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.1, 0.4), new THREE.MeshStandardMaterial({ color: 0xd946ef })); 
            enemyKnife.position.set(0.4, 0.9, -0.2);
            enemyKnife.name = "enemyWeapon_knife";
            enemyKnife.visible = false; 
            group.add(enemyKnife);

            body.userData = { targetId: id };
            head.userData = { targetId: id };
            group.position.copy(pos);

            if (gameMode === 'match' && id !== opponentId) {
                group.visible = false;
            }

            scene.add(group);
            otherPlayers[id] = group;
        }

        function createFpsWeapons() {
            gunContainer = new THREE.Group();
            gunContainer.position.set(0.25, -0.2, -0.4);
            camera.add(gunContainer);

            // 1. 소총 렌더링
            rifleMesh = new THREE.Mesh(
                new THREE.BoxGeometry(0.1, 0.15, 1.0), 
                new THREE.MeshStandardMaterial({ color: 0x475569, metalness: 0.8, roughness: 0.3 })
            );
            gunContainer.add(rifleMesh);

            // 2. 샷건 렌더링
            shotgunMesh = new THREE.Mesh(
                new THREE.BoxGeometry(0.12, 0.16, 0.85),
                new THREE.MeshStandardMaterial({ color: 0x78350f, metalness: 0.5, roughness: 0.5 }) // 약간 묵직한 목재/철재 느낌
            );
            shotgunMesh.visible = false;
            gunContainer.add(shotgunMesh);

            // 3. 단검 렌더링
            knifeMesh = new THREE.Group();
            const blade = new THREE.Mesh( 
                new THREE.BoxGeometry(0.02, 0.08, 0.45),
                new THREE.MeshStandardMaterial({ color: 0xef4444, metalness: 0.9, roughness: 0.1, emissive: 0xef4444, emissiveIntensity: 0.2 })
            );
            blade.position.set(0, 0, -0.2);
            knifeMesh.add(blade);

            const hilt = new THREE.Mesh( 
                new THREE.BoxGeometry(0.04, 0.1, 0.15),
                new THREE.MeshStandardMaterial({ color: 0x1e293b, roughness: 0.8 })
            );
            hilt.position.set(0, 0, 0.05);
            knifeMesh.add(hilt);

            knifeMesh.visible = false; 
            gunContainer.add(knifeMesh);
        }

        function onWindowWheel(e) {
            if (!isLocked) return;
            if (e.deltaY > 0) {
                // 휠 다운: 다음 무기
                currentWeaponIndex = (currentWeaponIndex + 1) % WEAPONS.length;
            } else if (e.deltaY < 0) {
                // 휠 업: 이전 무기
                currentWeaponIndex = (currentWeaponIndex - 1 + WEAPONS.length) % WEAPONS.length;
            }
            swapToWeapon(WEAPONS[currentWeaponIndex]);
        }

        function swapToWeapon(type) {
            if (currentWeapon === type || player.isReloading) return;
            currentWeapon = type;
            currentWeaponIndex = WEAPONS.indexOf(type);
            player.isShooting = false; 

            // 모든 메시 일단 숨기기
            rifleMesh.visible = false;
            shotgunMesh.visible = false;
            knifeMesh.visible = false;

            // 모든 UI 액티브 클래스 해제
            slotRifleEl.classList.remove('weapon-slot-active');
            slotShotgunEl.classList.remove('weapon-slot-active');
            slotKnifeEl.classList.remove('weapon-slot-active');

            // 해당하는 것 활성화
            if (type === 'rifle') {
                rifleMesh.visible = true;
                slotRifleEl.classList.add('weapon-slot-active');
            } else if (type === 'shotgun') {
                shotgunMesh.visible = true;
                slotShotgunEl.classList.add('weapon-slot-active');
            } else if (type === 'knife') {
                knifeMesh.visible = true;
                slotKnifeEl.classList.add('weapon-slot-active');
            }
        }

        function onKeyDown(e) {
            keys[e.code] = true;
            if (e.code === 'Space' && player.isGrounded && isLocked) {
                player.velocity.y = JUMP_FORCE;
                player.isGrounded = false;
            }
            if (e.code === 'KeyR' && !player.isReloading) {
                if (currentWeapon === 'rifle' && player.ammo < player.maxAmmo) {
                    reloadPlayerWeapon('rifle');
                } else if (currentWeapon === 'shotgun' && player.shotgunAmmo < player.maxShotgunAmmo) {
                    reloadPlayerWeapon('shotgun');
                }
            }
        }
        function onKeyUp(e) { keys[e.code] = false; }
        function onMouseMove(e) {
            if (!isLocked) return;
            yawObject.rotation.y -= e.movementX * 0.002; 
            pitchObject.rotation.x -= e.movementY * 0.002;
            pitchObject.rotation.x = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitchObject.rotation.x));
        }

        function reloadPlayerWeapon(type) {
            player.isReloading = true;
            if (type === 'rifle') {
                ammoDisplayRifle.innerHTML = `<span class="text-amber-500 animate-pulse text-xs">RELOAD</span>`;
                setTimeout(() => {
                    player.ammo = player.maxAmmo;
                    ammoDisplayRifle.innerHTML = `${player.ammo}<span class="text-gray-500 text-xs">/${player.maxAmmo}</span>`;
                    player.isReloading = false;
                }, 1200);
            } else if (type === 'shotgun') {
                ammoDisplayShotgun.innerHTML = `<span class="text-amber-500 animate-pulse text-xs">RELOAD</span>`;
                setTimeout(() => {
                    player.shotgunAmmo = player.maxShotgunAmmo;
                    ammoDisplayShotgun.innerHTML = `${player.shotgunAmmo}<span class="text-gray-500 text-xs">/${player.maxShotgunAmmo}</span>`;
                    player.isReloading = false;
                }, 1500); // 샷건은 장전 딜레이 살짝 길게
            }
        }

        function handleWeaponShooting() {
            if (!isLocked || player.isReloading) return;
            
            // 잔탄 검사
            if (currentWeapon === 'rifle' && player.ammo <= 0) { reloadPlayerWeapon('rifle'); return; }
            if (currentWeapon === 'shotgun' && player.shotgunAmmo <= 0) { reloadPlayerWeapon('shotgun'); return; }

            const now = performance.now();
            let weaponDelay = player.shootDelay; // 라이플 기본 100ms
            if (currentWeapon === 'knife') weaponDelay = 250;
            if (currentWeapon === 'shotgun') weaponDelay = 800; // 샷건 연사속도는 제한

            if (now - player.lastShotTime < weaponDelay) return;
            player.lastShotTime = now;

            // 반동 애니메이션
            gunContainer.position.z = -0.3;
            setTimeout(() => gunContainer.position.z = -0.4, 60);

            // 타겟 메시 리스트 확보
            const targetMeshes = [];
            Object.values(otherPlayers).forEach(p => {
                if (p.visible) {
                    p.traverse(c => { if(c.isMesh) targetMeshes.push(c); });
                }
            });
            if (currentWeapon !== 'knife') {
                obstacles.forEach(obs => targetMeshes.push(obs));
            }

            const startVec = new THREE.Vector3(0.25, -0.15, -0.9).unproject(camera);

            if (currentWeapon === 'rifle') {
                player.ammo--;
                ammoDisplayRifle.innerHTML = `${player.ammo}<span class="text-gray-500 text-xs">/${player.maxAmmo}</span>`;

                const raycaster = new THREE.Raycaster();
                raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
                let endVec = new THREE.Vector3();
                raycaster.ray.at(100, endVec);

                const intersects = raycaster.intersectObjects(targetMeshes);
                if (intersects.length > 0) {
                    endVec.copy(intersects[0].point);
                    if (gameMode === 'match' && intersects[0].object.userData.targetId === opponentId) {
                        socket.emit('hitPlayer', { roomId: currentRoomId, targetId: opponentId, damage: DAMAGE_RIFLE });
                    }
                }
                renderTracerTrail(startVec, endVec, 0xfacc15);
                socket.emit('shoot', { roomId: currentRoomId, start: startVec, end: endVec, isKnifeAttack: false, isShotgun: false });

            } else if (currentWeapon === 'shotgun') {
                player.shotgunAmmo--;
                ammoDisplayShotgun.innerHTML = `${player.shotgunAmmo}<span class="text-gray-500 text-xs">/${player.maxShotgunAmmo}</span>`;

                let totalShotgunDamage = 0;
                let shotgunPelletEnds = [];

                // 5개의 펠릿 분산 발사
                for (let i = 0; i < 5; i++) {
                    // 미세한 무작위 오차 부여 (산탄 범위)
                    const spreadX = (Math.random() - 0.5) * 0.07;
                    const spreadY = (Math.random() - 0.5) * 0.07;

                    const raycaster = new THREE.Raycaster();
                    raycaster.setFromCamera(new THREE.Vector2(spreadX, spreadY), camera);
                    
                    let endVec = new THREE.Vector3();
                    raycaster.ray.at(35, endVec); // 샷건 유효사거리 35미터 정도 제한

                    const intersects = raycaster.intersectObjects(targetMeshes);
                    if (intersects.length > 0 && intersects[0].distance <= 35) {
                        endVec.copy(intersects[0].point);
                        if (gameMode === 'match' && intersects[0].object.userData.targetId === opponentId) {
                            totalShotgunDamage += DAMAGE_SHOTGUN_PELLET;
                        }
                    }
                    shotgunPelletEnds.push(endVec.clone());
                    renderTracerTrail(startVec, endVec, 0xf59e0b); // 주황빛 궤적
                }

                if (gameMode === 'match' && totalShotgunDamage > 0) {
                    socket.emit('hitPlayer', { roomId: currentRoomId, targetId: opponentId, damage: totalShotgunDamage });
                }

                socket.emit('shoot', { 
                    roomId: currentRoomId, 
                    start: startVec, 
                    isKnifeAttack: false, 
                    isShotgun: true, 
                    pellets: shotgunPelletEnds 
                });

            } else if (currentWeapon === 'knife') {
                const raycaster = new THREE.Raycaster();
                raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
                const intersects = raycaster.intersectObjects(targetMeshes);
                
                if (intersects.length > 0 && intersects[0].distance <= KNIFE_RANGE) {
                    if (gameMode === 'match' && intersects[0].object.userData.targetId === opponentId) {
                        socket.emit('hitPlayer', { roomId: currentRoomId, targetId: opponentId, damage: DAMAGE_KNIFE });
                    }
                }
                socket.emit('shoot', { roomId: currentRoomId, isKnifeAttack: true });
            }
        }

        function renderTracerTrail(start, end, color) {
            const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.8 });
            const geo = new THREE.BufferGeometry().setFromPoints([start, end]);
            const line = new THREE.Line(geo, mat);
            scene.add(line);
            setTimeout(() => { scene.remove(line); geo.dispose(); mat.dispose(); }, 40); 
        }

        function updateMainLoopAndPhysics() {
            if (!player.isGrounded) {
                player.velocity.y -= GRAVITY; 
                yawObject.position.y += player.velocity.y;

                const floorY = 0;
                if (yawObject.position.y <= PLAYER_HEIGHT + floorY) {
                    yawObject.position.y = PLAYER_HEIGHT + floorY;
                    player.velocity.y = 0;
                    player.isGrounded = true;
                }
            }

            if (!isLocked) return;

            const moveDir = new THREE.Vector3();
            if (keys['KeyW']) moveDir.z -= 1;
            if (keys['KeyS']) moveDir.z += 1;
            if (keys['KeyA']) moveDir.x -= 1;
            if (keys['KeyD']) moveDir.x += 1;
            moveDir.normalize();

            const rotatedDir = moveDir.clone().applyQuaternion(yawObject.quaternion);
            rotatedDir.y = 0; 
            rotatedDir.normalize();
            yawObject.position.addScaledVector(rotatedDir, PLAYER_SPEED);

            if (gameMode === 'match') {
                obstacles.forEach(obs => {
                    const obsPos = obs.position;
                    const obsSize = obs.userData;
                    const playerPos = yawObject.position;
                    const playerRadius = 0.5; 

                    const dx = Math.abs(playerPos.x - obsPos.x);
                    if (dx < (obsSize.width / 2 + playerRadius)) {
                        const dz = Math.abs(playerPos.z - obsPos.z);
                        if (dz < (obsSize.depth / 2 + playerRadius)) {
                            const pushX = (obsSize.width / 2 + playerRadius) - dx;
                            const pushZ = (obsSize.depth / 2 + playerRadius) - dz;

                            if (pushX < pushZ) {
                                yawObject.position.x += (playerPos.x > obsPos.x ? pushX : -pushX);
                            } else {
                                yawObject.position.z += (playerPos.z > obsPos.z ? pushZ : -pushZ);
                            }
                        }
                    }
                });
            }

            if (gameMode === 'lobby') {
                yawObject.position.x = Math.max(-14, Math.min(14, yawObject.position.x));
                yawObject.position.z = Math.max(-14, Math.min(14, yawObject.position.z));

                const distToPad = new THREE.Vector2(yawObject.position.x, yawObject.position.z).distanceTo(new THREE.Vector2(padPos.x, padPos.z));
                const standingOnPad = (distToPad < padRadius);

                if (standingOnPad !== isPlayerReady) {
                    isPlayerReady = standingOnPad;
                    socket.emit('toggleReady', { isReady: isPlayerReady });
                }
            } else {
                yawObject.position.x = Math.max(-21, Math.min(21, yawObject.position.x));
                yawObject.position.z = Math.max(-56, Math.min(-14, yawObject.position.z));
            }

            socket.emit('playerMovement', { 
                roomId: currentRoomId, 
                pos: yawObject.position, 
                rotY: yawObject.rotation.y,
                weapon: currentWeapon
            });
        }

        function onWindowResize() { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }
        
        function showResultAlert(msg, cssClass) {
            const div = document.createElement('div');
            div.className = `absolute top-1/3 left-1/2 -translate-x-1/2 bg-black/80 px-10 py-5 border border-white/20 text-3xl font-black rounded-2xl pointer-events-none z-50 animate-bounce ${cssClass}`;
            div.innerText = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 2500);
        }

        function animate() {
            requestAnimationFrame(animate);
            updateMainLoopAndPhysics();
            if (player.isShooting) handleWeaponShooting();
            renderer.render(scene, camera);
        }

        window.onload = () => { init(); animate(); };
    </script>
</body>
