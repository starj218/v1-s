<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ONLINE FPS ARENA - 온라인 총게임</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; user-select: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(255, 255, 255, 0.9); }
        #crosshair::before { top: 4px; left: -5px; width: 20px; height: 2px; }
        #crosshair::after { top: -5px; left: 4px; width: 2px; height: 20px; }
        #damage-flash { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; transition: all 0.1s; z-index: 5; }
        .hit { background-color: rgba(239, 68, 68, 0.4); border: 15px solid rgba(239, 68, 68, 0.6); }
    </style>
</head>
<body class="bg-gray-900 text-white">

    <div id="damage-flash"></div>

    <div class="absolute top-0 left-0 w-full p-4 flex flex-col md:flex-row gap-4 justify-between items-center md:items-start pointer-events-none z-10">
        <div class="bg-black/70 p-3 rounded-lg border border-gray-800">
            <div class="text-xs text-gray-500 font-bold uppercase">상태</div>
            <div id="game-status" class="text-xl font-black text-amber-400">대기실 (LOBBY)</div>
        </div>

        <div class="bg-black/80 p-3 rounded-xl border border-gray-800 grid grid-cols-3 gap-x-6 gap-y-2 text-center shadow-2xl min-w-[320px]">
            <div class="flex justify-between items-center gap-2"><span class="text-[11px] text-amber-400 font-bold">PAD A</span><span id="pad-A-text" class="text-sm font-black">0 / 2</span></div>
            <div class="flex justify-between items-center gap-2"><span class="text-[11px] text-purple-400 font-bold">PAD B</span><span id="pad-B-text" class="text-sm font-black">0 / 2</span></div>
            <div class="flex justify-between items-center gap-2"><span class="text-[11px] text-cyan-400 font-bold">PAD C</span><span id="pad-C-text" class="text-sm font-black">0 / 2</span></div>
            <div class="flex justify-between items-center gap-2"><span class="text-[11px] text-lime-400 font-bold">PAD D</span><span id="pad-D-text" class="text-sm font-black">0 / 2</span></div>
            <div class="flex justify-between items-center gap-2"><span class="text-[11px] text-pink-400 font-bold">PAD E</span><span id="pad-E-text" class="text-sm font-black">0 / 2</span></div>
            <div class="flex justify-between items-center gap-2"><span class="text-[11px] text-yellow-300 font-bold">PAD F</span><span id="pad-F-text" class="text-sm font-black">0 / 2</span></div>
            <div class="flex justify-between items-center gap-2"><span class="text-[11px] text-emerald-400 font-bold">PAD G</span><span id="pad-G-text" class="text-sm font-black">0 / 2</span></div>
            <div class="flex justify-between items-center gap-2"><span class="text-[11px] text-blue-400 font-bold">PAD H</span><span id="pad-H-text" class="text-sm font-black">0 / 2</span></div>
            <div class="flex justify-between items-center gap-2"><span class="text-[11px] text-rose-500 font-bold">PAD I</span><span id="pad-I-text" class="text-sm font-black">0 / 2</span></div>
        </div>

        <div class="bg-black/70 p-3 rounded-lg border border-gray-800 text-right">
            <div class="text-xs text-gray-500 font-bold">내 전적</div>
            <div class="text-xl font-black text-white"><span id="score-win" class="text-green-400">0</span>승 <span id="score-lose" class="text-red-400">0</span>패</div>
        </div>
    </div>

    <div id="crosshair"></div>

    <div class="absolute bottom-6 left-1/2 -translate-x-1/2 w-full max-w-2xl px-4 pointer-events-none z-10 flex flex-col gap-3">
        <div id="hp-versus-container" class="flex justify-between items-center bg-black/70 p-3 rounded-xl border border-white/10 opacity-0 transition-opacity">
            <div class="w-2/5">
                <div class="flex justify-between text-xs font-bold mb-1"><span class="text-blue-400">나</span> <span id="my-hp-text">100 HP</span></div>
                <div class="w-full bg-gray-800 h-3 rounded-full overflow-hidden"><div id="my-hp-bar" class="bg-blue-500 h-full w-full"></div></div>
            </div>
            <div class="font-black italic text-rose-500 text-xl">VS</div>
            <div class="w-2/5 text-right">
                <div class="flex justify-between text-xs font-bold mb-1 flex-row-reverse"><span class="text-red-400">상대</span> <span id="enemy-hp-text">100 HP</span></div>
                <div class="w-full bg-gray-800 h-3 rounded-full overflow-hidden"><div id="enemy-hp-bar" class="bg-red-500 h-full w-full float-right"></div></div>
            </div>
        </div>

        <div class="flex justify-between items-end">
            <div class="bg-black/70 p-3 rounded-lg text-xs text-gray-300">
                <span class="text-amber-400 font-bold">WASD</span>: 이동 | <span class="text-amber-400 font-bold">SPACE</span>: 점프 | <span class="text-amber-400 font-bold">R</span>: 장전 | 아무 컬러 발판에 올라가 매칭 대기 (15방 룰)
            </div>
            <div class="bg-black/90 px-6 py-3 rounded-xl border border-amber-500 flex items-center gap-4">
                <div class="text-right text-3xl font-black text-amber-400"><span id="current-ammo">30</span>/30</div>
                <div class="text-[11px] text-gray-400 font-bold uppercase">AMMO</div>
            </div>
        </div>
    </div>

    <div id="intro-modal" class="absolute top-0 left-0 w-full h-full bg-black/95 flex flex-col justify-center items-center z-50 transition-opacity">
        <h1 class="text-4xl font-black text-amber-500 mb-6 tracking-wider">ONLINE FPS ARENA</h1>
        <button id="start-btn" class="bg-amber-500 hover:bg-amber-600 text-black font-extrabold py-4 px-8 rounded-xl text-lg transition-transform active:scale-95 pointer-events-auto">
            게임 서버 접속하기
        </button>
    </div>

    <div id="canvas-container"></div>

    <script>
        // ⚠️ 내 진짜 렌더 서버 주소 입력 확인!
        const socket = io('https://online-fps-server.onrender.com'); 

        const PLAYER_SPEED = 0.12;
        const JUMP_FORCE = 0.08;
        const GRAVITY = 0.0035;
        const PLAYER_HEIGHT = 1.6;
        const DAMAGE_PER_SHOT = 6.7; // 15방 수명용 데미지

        let scene, camera, renderer;
        let keys = {};
        let otherPlayers = {}; 
        
        let pads = [];
        const padRadius = 1.6;
        
        let gameMode = 'lobby'; 
        let currentRoomId = null;
        let myRole = null;
        let opponentId = null;
        let activatedPadId = null; 

        let player = {
            hp: 100,
            ammo: 30,
            maxAmmo: 30,
            isReloading: false,
            pos: new THREE.Vector3(0, PLAYER_HEIGHT, 12), 
            velocity: new THREE.Vector3(),
            isGrounded: true,
            isShooting: false,
            lastShotTime: 0,
            shootDelay: 120
        };

        let gunModel;
        let isLocked = false;
        const pitchObject = new THREE.Object3D();
        const yawObject = new THREE.Object3D();

        const startBtn = document.getElementById('start-btn');
        const introModal = document.getElementById('intro-modal');
        const currentAmmoEl = document.getElementById('current-ammo');
        const myHpBar = document.getElementById('my-hp-bar');
        const myHpText = document.getElementById('my-hp-text');
        const enemyHpBar = document.getElementById('enemy-hp-bar');
        const enemyHpText = document.getElementById('enemy-hp-text');
        const versusContainer = document.getElementById('hp-versus-container');
        const gameStatusEl = document.getElementById('game-status');
        const damageFlashEl = document.getElementById('damage-flash');
        const scoreWinEl = document.getElementById('score-win');
        const scoreLoseEl = document.getElementById('score-lose');

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f172a);
            scene.fog = new THREE.FogExp2(0x0f172a, 0.015);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            pitchObject.add(camera);
            yawObject.add(pitchObject);
            yawObject.position.copy(player.pos);
            scene.add(yawObject);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
            dirLight.position.set(10, 30, 10);
            scene.add(dirLight);

            buildLobbyAndArena();
            createPlayerGun();
            setupNetworkingEvents();

            window.addEventListener('resize', onWindowResize);
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            document.addEventListener('mousemove', onMouseMove);
            
            document.addEventListener('mousedown', (e) => { if (isLocked && e.button === 0) player.isShooting = true; });
            document.addEventListener('mouseup', (e) => { if (e.button === 0) player.isShooting = false; });
            document.addEventListener('pointerlockchange', () => { isLocked = (document.pointerLockElement === document.body); });

            startBtn.addEventListener('click', () => {
                document.body.requestPointerLock();
                introModal.style.opacity = '0';
                setTimeout(() => introModal.style.display = 'none', 300);
            });
        }

        function setupNetworkingEvents() {
            socket.on('currentPlayers', (players) => {
                Object.keys(players).forEach((id) => {
                    if (id !== socket.id) spawnOtherPlayerMesh(id, players[id].pos);
                });
            });

            socket.on('newPlayer', (playerInfo) => { spawnOtherPlayerMesh(playerInfo.id, playerInfo.pos); });

            socket.on('playerMoved', (playerInfo) => {
                if (otherPlayers[playerInfo.id]) {
                    otherPlayers[playerInfo.id].position.copy(playerInfo.pos);
                    otherPlayers[playerInfo.id].rotation.y = playerInfo.rotY;
                }
            });

            socket.on('readyStatusUpdate', (statusData) => {
                Object.keys(statusData).forEach(padId => {
                    const el = document.getElementById(`pad-${padId}-text`);
                    if (el) {
                        el.innerText = `${statusData[padId]} / 2`;
                        el.className = statusData[padId] > 0 ? "text-sm font-black text-green-400" : "text-sm font-black text-white";
                    }
                });
            });

            socket.on('matchFound', (data) => {
                currentRoomId = data.roomId;
                myRole = data.role;
                opponentId = data.opponentId;
                gameMode = 'match';

                gameStatusEl.innerText = `아레나 MATCH [패드 ${data.padId}]`;
                gameStatusEl.className = "text-xl font-black text-rose-500 animate-pulse";
                versusContainer.classList.remove('opacity-0');

                if (myRole === 'p1') {
                    yawObject.position.set(0, PLAYER_HEIGHT, -22);
                    yawObject.rotation.y = 0;
                } else {
                    yawObject.position.set(0, PLAYER_HEIGHT, -48);
                    yawObject.rotation.y = Math.PI; 
                }
                
                player.hp = 100;
                player.ammo = player.maxAmmo;
                currentAmmoEl.innerText = player.ammo;
                
                // 맵 로딩 시 둘 다 풀피(100)로 갱신
                myHpBar.style.width = '100%';
                myHpText.innerText = '100 HP';
                enemyHpBar.style.width = '100%';
                enemyHpText.innerText = '100 HP';
            });

            socket.on('opponentShoot', (data) => { renderTracerTrail(data.start, data.end, 0xef4444); });

            // 🎯 내 피가 까졌을 때 이벤트 수신
            socket.on('damaged', (data) => {
                player.hp = data.currentHp;
                const percentage = Math.ceil(player.hp);
                myHpBar.style.width = percentage + '%'; 
                myHpText.innerText = `${percentage} HP`; 
                
                damageFlashEl.className = 'hit';
                setTimeout(() => damageFlashEl.className = '', 100);

                if (player.hp <= 0) {
                    socket.emit('matchOver', { winnerId: opponentId, loserId: socket.id });
                }
            });

            // 🎯 상대방 피가 까졌을 때 수신하여 내 화면 오른쪽 바 갱신!
            socket.on('updateEnemyHP', (data) => {
                const percentage = Math.ceil(data.enemyHp);
                enemyHpBar.style.width = percentage + '%';
                enemyHpText.innerText = `${percentage} HP`;
            });

            socket.on('gameResult', (result) => {
                gameMode = 'lobby';
                versusContainer.classList.add('opacity-0');
                gameStatusEl.innerText = "대기실 (LOBBY)";
                gameStatusEl.className = "text-xl font-black text-amber-400";
                
                if(result === 'win') {
                    scoreWinEl.innerText = parseInt(scoreWinEl.innerText) + 1;
                    showResultAlert("👑 대결 승리!", "text-green-400");
                } else {
                    scoreLoseEl.innerText = parseInt(scoreLoseEl.innerText) + 1;
                    showResultAlert("💀 대결 패배...", "text-red-400");
                }

                yawObject.position.set((Math.random() - 0.5) * 5, PLAYER_HEIGHT, 12);
                yawObject.rotation.set(0, 0, 0);
                activatedPadId = null;
            });

            socket.on('playerDisconnected', (id) => {
                if (otherPlayers[id]) {
                    scene.remove(otherPlayers[id]);
                    delete otherPlayers[id];
                }
            });
        }

        function buildLobbyAndArena() {
            const lobbyFloorMat = new THREE.MeshStandardMaterial({ color: 0x1e293b, roughness: 0.8 });
            const lobbyFloor = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), lobbyFloorMat);
            lobbyFloor.rotation.x = -Math.PI / 2;
            scene.add(lobbyFloor);

            const arenaFloorMat = new THREE.MeshStandardMaterial({ color: 0x0f172a, roughness: 0.6 });
            const arenaFloor = new THREE.Mesh(new THREE.BoxGeometry(40, 1, 40), arenaFloorMat);
            arenaFloor.position.set(0, -0.5, -35);
            scene.add(arenaFloor);

            const obsMat = new THREE.MeshStandardMaterial({ color: 0x475569 });
            const obs = new THREE.Mesh(new THREE.BoxGeometry(6, 6, 6), obsMat);
            obs.position.set(0, 3, -35);
            scene.add(obs);

            const padConfigs = [
                { id: 'A', x: -6, z: 4, color: 0xf59e0b },  
                { id: 'B', x: 0, z: 4, color: 0xa855f7 },   
                { id: 'C', x: 6, z: 4, color: 0x06b6d4 },   
                { id: 'D', x: -6, z: 8, color: 0x84cc16 },  
                { id: 'E', x: 0, z: 8, color: 0xec4899 },   
                { id: 'F', x: 6, z: 8, color: 0xeab308 },   
                { id: 'G', x: -6, z: 12, color: 0x10b981 }, 
                { id: 'H', x: 0, z: 12, color: 0x3b82f6 },  
                { id: 'I', x: 6, z: 12, color: 0xef4444 }   
            ];

            padConfigs.forEach(config => {
                const padMesh = new THREE.Mesh(
                    new THREE.CylinderGeometry(padRadius, padRadius, 0.1, 32),
                    new THREE.MeshStandardMaterial({ color: config.color, emissive: config.color, emissiveIntensity: 0.35 })
                );
                padMesh.position.set(config.x, 0.05, config.z);
                scene.add(padMesh);
                pads.push({ id: config.id, x: config.x, z: config.z });
            });
        }

        function spawnOtherPlayerMesh(id, pos) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1.8, 0.6), new THREE.MeshStandardMaterial({ color: 0xef4444 }));
            body.position.y = 0.9;
            group.add(body);
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.7), new THREE.MeshStandardMaterial({ color: 0xfacc15 }));
            head.position.y = 2.1;
            group.add(head);

            body.userData = { targetId: id };
            head.userData = { targetId: id };
            group.position.copy(pos);
            scene.add(group);
            otherPlayers[id] = group;
        }

        function createPlayerGun() {
            gunModel = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.15, 1.0), new THREE.MeshStandardMaterial({ color: 0x334155 }));
            gunModel.add(body);
            gunModel.position.set(0.25, -0.2, -0.4); 
            camera.add(gunModel);
        }

        function onKeyDown(e) {
            keys[e.code] = true;
            if (e.code === 'Space' && player.isGrounded && isLocked) {
                player.velocity.y = JUMP_FORCE;
                player.isGrounded = false;
            }
            if (e.code === 'KeyR' && player.ammo < player.maxAmmo && !player.isReloading) {
                reloadPlayerWeapon();
            }
        }
        function onKeyUp(e) { keys[e.code] = false; }
        function onMouseMove(e) {
            if (!isLocked) return;
            yawObject.rotation.y -= e.movementX * 0.0022;
            pitchObject.rotation.x -= e.movementY * 0.0022;
            pitchObject.rotation.x = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitchObject.rotation.x));
        }

        function reloadPlayerWeapon() {
            player.isReloading = true;
            currentAmmoEl.innerText = "장전 중";
            currentAmmoEl.classList.add('animate-pulse', 'text-amber-300');
            setTimeout(() => {
                player.ammo = player.maxAmmo;
                currentAmmoEl.innerText = player.ammo;
                currentAmmoEl.classList.remove('animate-pulse', 'text-amber-300');
                player.isReloading = false;
            }, 1200);
        }

        function handleWeaponShooting() {
            if (!isLocked || player.isReloading || player.ammo <= 0) {
                if(player.ammo <= 0 && isLocked) reloadPlayerWeapon();
                return;
            }
            const now = performance.now();
            if (now - player.lastShotTime < player.shootDelay) return;

            player.lastShotTime = now;
            player.ammo--;
            currentAmmoEl.innerText = player.ammo;

            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);

            const startVec = new THREE.Vector3(0.15, -0.15, -0.4).unproject(camera);
            let endVec = new THREE.Vector3();
            raycaster.ray.at(100, endVec);

            const targetMeshes = [];
            Object.values(otherPlayers).forEach(p => p.traverse(c => { if(c.isMesh) targetMeshes.push(c); }));

            const intersects = raycaster.intersectObjects(targetMeshes);
            if (intersects.length > 0) {
                const hit = intersects[0];
                endVec.copy(hit.point);

                if (gameMode === 'match' && hit.object.userData.targetId) {
                    socket.emit('hitPlayer', { targetId: hit.object.userData.targetId, damage: DAMAGE_PER_SHOT });
                }
            }

            renderTracerTrail(startVec, endVec, 0xf59e0b);
            socket.emit('shoot', { start: startVec, end: endVec });
        }

        function renderTracerTrail(start, end, color) {
            const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.7 });
            const geo = new THREE.BufferGeometry().setFromPoints([start, end]);
            const line = new THREE.Line(geo, mat);
            scene.add(line);
            setTimeout(() => { scene.remove(line); geo.dispose(); mat.dispose(); }, 50);
        }

        function updateMainLoopAndPhysics() {
            if (!player.isGrounded) {
                player.velocity.y -= GRAVITY; 
                yawObject.position.y += player.velocity.y;

                if (yawObject.position.y <= PLAYER_HEIGHT) {
                    yawObject.position.y = PLAYER_HEIGHT;
                    player.velocity.y = 0;
                    player.isGrounded = true;
                }
            }

            if (!isLocked) return;

            const moveDir = new THREE.Vector3();
            if (keys['KeyW']) moveDir.z -= 1;
            if (keys['KeyS']) moveDir.z += 1;
            if (keys['KeyA']) moveDir.x -= 1;
            if (keys['KeyD']) moveDir.x += 1;
            moveDir.normalize();

            const rotatedDir = moveDir.clone().applyQuaternion(yawObject.quaternion);
            rotatedDir.y = 0; 
            rotatedDir.normalize();
            yawObject.position.addScaledVector(rotatedDir, PLAYER_SPEED);

            if (gameMode === 'lobby') {
                yawObject.position.x = Math.max(-14, Math.min(14, yawObject.position.x));
                yawObject.position.z = Math.max(-14, Math.min(14, yawObject.position.z));

                let standingPadId = null;
                for (let i = 0; i < pads.length; i++) {
                    const d = new THREE.Vector2(yawObject.position.x, yawObject.position.z).distanceTo(new THREE.Vector2(pads[i].x, pads[i].z));
                    if (d < padRadius) {
                        standingPadId = pads[i].id;
                        break;
                    }
                }

                if (standingPadId !== activatedPadId) {
                    if (activatedPadId !== null) socket.emit('toggleReady', { padId: activatedPadId, isReady: false });
                    if (standingPadId !== null) socket.emit('toggleReady', { padId: standingPadId, isReady: true });
                    activatedPadId = standingPadId;
                }
            } else {
                yawObject.position.x = Math.max(-18, Math.min(18, yawObject.position.x));
                yawObject.position.z = Math.max(-53, Math.min(-17, yawObject.position.z));
            }

            socket.emit('playerMovement', { pos: yawObject.position, rotY: yawObject.rotation.y });
        }

        function onWindowResize() { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }
        function showResultAlert(msg, cssClass) {
            const div = document.createElement('div');
            div.className = `absolute top-1/3 left-1/2 -translate-x-1/2 bg-black/80 px-8 py-4 border border-white/20 text-3xl font-black rounded-2xl pointer-events-none z-50 animate-bounce ${cssClass}`;
            div.innerText = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 2500);
        }

        function animate() {
            requestAnimationFrame(animate);
            updateMainLoopAndPhysics();
            if (player.isShooting) handleWeaponShooting();
            renderer.render(scene, camera);
        }

        window.onload = () => { init(); animate(); };
    </script>
</body>
</html>
