<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로블록스 라이벌 스타일 - 실시간 멀티플레이어 1v1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; user-select: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(255, 255, 255, 0.8); }
        #crosshair::before { top: 4px; left: -5px; width: 20px; height: 2px; }
        #crosshair::after { top: -5px; left: 4px; width: 2px; height: 20px; }
        #damage-indicator { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; border: 0px solid rgba(239, 68, 68, 0); pointer-events: none; transition: all 0.1s; z-index: 5; }
        .damaged { border: 20px solid rgba(239, 68, 68, 0.6) !important; }
    </style>
</head>
<body class="bg-gray-900 text-white">

    <div id="damage-indicator"></div>

    <div class="absolute top-0 left-0 w-full p-4 flex justify-between items-start pointer-events-none z-10">
        <div class="bg-black/60 p-3 rounded-lg border border-gray-700">
            <div class="text-xs text-gray-400 font-bold uppercase">구역</div>
            <div id="game-status" class="text-xl font-black text-amber-400">대기실 (LOBBY)</div>
        </div>

        <div class="bg-black/60 p-4 rounded-lg border border-gray-700 text-center mx-auto min-w-[250px]">
            <div class="text-xs text-gray-400 font-bold mb-1">1v1 배틀 패드 상태</div>
            <div class="text-lg font-black text-green-400" id="match-status-text">대기 중 (0 / 2)</div>
            <div class="text-[11px] text-gray-400 mt-1">노란 발판 위로 올라가면 매칭이 수락됩니다.</div>
        </div>

        <div class="bg-black/60 p-3 rounded-lg border border-gray-700 text-right">
            <div class="text-xs text-gray-400 font-bold">내 전적</div>
            <div class="text-xl font-black text-white"><span id="score-win" class="text-green-400">0</span>승 <span id="score-lose" class="text-red-400">0</span>패</div>
        </div>
    </div>

    <div id="crosshair"></div>

    <div class="absolute bottom-6 left-1/2 -translate-x-1/2 w-full max-w-2xl px-4 pointer-events-none z-10 flex flex-col gap-3">
        <div id="versus-container" class="flex justify-between items-center bg-black/60 p-3 rounded-xl border border-white/10 opacity-0 transition-opacity">
            <div class="w-2/5">
                <div class="flex justify-between text-xs font-bold mb-1"><span class="text-blue-400">나</span> <span id="my-hp-text">100 HP</span></div>
                <div class="w-full bg-gray-800 h-3 rounded-full overflow-hidden"><div id="my-hp-bar" class="bg-blue-500 h-full w-full"></div></div>
            </div>
            <div class="font-black italic text-amber-500 text-lg">VS</div>
            <div class="w-2/5 text-right">
                <div class="flex justify-between text-xs font-bold mb-1 flex-row-reverse"><span class="text-red-400">상대방</span> <span id="enemy-hp-text">100 HP</span></div>
                <div class="w-full bg-gray-800 h-3 rounded-full overflow-hidden"><div id="enemy-hp-bar" class="bg-red-500 h-full w-full float-right"></div></div>
            </div>
        </div>

        <div class="flex justify-between items-end">
            <div class="bg-black/60 p-3 rounded-lg text-xs text-gray-300">
                <span class="text-amber-400 font-bold">WASD</span>: 이동 | <span class="text-amber-400 font-bold">SPACE</span>: 점프 | <span class="text-amber-400 font-bold">R</span>: 장전 | <span class="text-amber-400 font-bold">클릭</span>: 연사 사격
            </div>
            <div class="bg-black/80 px-6 py-3 rounded-xl border border-amber-500 flex items-center gap-4">
                <div><div class="text-[10px] text-amber-400 font-bold">RIFLE</div><div class="text-md font-bold">M4A1-ONLINE</div></div>
                <div class="text-2xl font-black text-amber-400"><span id="current-ammo">30</span>/30</div>
            </div>
        </div>
    </div>

    <div id="intro-modal" class="absolute top-0 left-0 w-full h-full bg-black/90 flex flex-col justify-center items-center z-50">
        <div class="max-w-sm text-center p-6 bg-gray-800 rounded-2xl border border-amber-500/30">
            <h1 class="text-3xl font-black text-amber-500 mb-4">RIVALS MULTIPLAYER</h1>
            <button id="start-btn" class="w-full bg-amber-500 hover:bg-amber-600 text-black font-extrabold py-3 px-6 rounded-xl text-md transition-all">
                서버 접속하여 플레이하기
            </button>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script>
        // --- 네트워크 연동 설정 ---
        // 로컬 환경 테스트 시 고정 IP 혹은 'http://localhost:3000' 입력
        const socket = io('https://a1b2-123-45-67.ngrok-free.app');

        const PLAYER_SPEED = 0.12;
        const JUMP_FORCE = 0.08;
        const GRAVITY = 0.0035;
        const PLAYER_HEIGHT = 1.6;

        let scene, camera, renderer;
        let keys = {};
        let otherPlayers = {}; // 내 화면에 렌더링될 다른 온라인 유저 객체들
        
        let myPad, rivalPad;
        const padRadius = 2.0;
        let currentRoomId = null;
        let myRole = null;
        let opponentId = null;
        let gameMode = 'lobby';

        // 나의 물리/전투 상태 변수
        let player = {
            hp: 100,
            ammo: 30,
            maxAmmo: 30,
            isReloading: false,
            pos: new THREE.Vector3(0, PLAYER_HEIGHT, 12),
            velocity: new THREE.Vector3(),
            isGrounded: true,
            lastShotTime: 0,
            shootDelay: 120,
            isShooting: false
        };

        let gunGroup;
        let isLocked = false;
        const pitchObject = new THREE.Object3D();
        const yawObject = new THREE.Object3D();

        // DOM 캐싱
        const startBtn = document.getElementById('start-btn');
        const introModal = document.getElementById('intro-modal');
        const currentAmmoEl = document.getElementById('current-ammo');
        const myHpBar = document.getElementById('my-hp-bar');
        const myHpText = document.getElementById('my-hp-text');
        const enemyHpBar = document.getElementById('enemy-hp-bar');
        const enemyHpText = document.getElementById('enemy-hp-text');
        const matchStatusText = document.getElementById('match-status-text');
        const versusContainer = document.getElementById('versus-container');
        const gameStatusEl = document.getElementById('game-status');
        const damageIndicator = document.getElementById('damage-indicator');

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f172a);
            scene.fog = new THREE.FogExp2(0x0f172a, 0.015);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            pitchObject.add(camera);
            yawObject.add(pitchObject);
            yawObject.position.copy(player.pos);
            scene.add(yawObject);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 라이팅 설정
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
            dirLight.position.set(10, 30, 10);
            scene.add(dirLight);

            buildMaps();
            createPlayerWeapon();
            setupNetworkEvents();

            // 이벤트 바인딩
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            document.addEventListener('mousemove', onMouseMove);
            
            document.addEventListener('mousedown', (e) => { if (isLocked && e.button === 0) player.isShooting = true; });
            document.addEventListener('mouseup', (e) => { if (e.button === 0) player.isShooting = false; });
            document.addEventListener('pointerlockchange', () => { isLocked = (document.pointerLockElement === document.body); });

            startBtn.addEventListener('click', () => {
                document.body.requestPointerLock();
                introModal.style.display = 'none';
            });
        }

        // --- 실시간 네트워크 이벤트 처리 (Socket.io) ---
        function setupNetworkEvents() {
            // 1. 현재 접속해 있는 전체 유저 목록 동기화 받아 모델링 생성
            socket.on('currentPlayers', (players) => {
                Object.keys(players).forEach((id) => {
                    if (id !== socket.id) {
                        createRemotePlayerMesh(id, players[id].pos);
                    }
                });
            });

            // 2. 다른 유저가 새로 서버에 들어왔을 때
            socket.on('newPlayer', (playerInfo) => {
                createRemotePlayerMesh(playerInfo.id, playerInfo.pos);
            });

            // 3. 다른 유저가 움직였을 때 실시간 화면 트래킹 적용
            socket.on('playerMoved', (playerInfo) => {
                if (otherPlayers[playerInfo.id]) {
                    otherPlayers[playerInfo.id].position.copy(playerInfo.pos);
                    otherPlayers[playerInfo.id].rotation.y = playerInfo.rotY;
                }
            });

            // 4. 누군가 발판 대기열 상태를 바꿨을 때 UI 갱신
            socket.on('readyStatusUpdate', (data) => {
                matchStatusText.innerText = `매칭 대기 중 (${data.readyCount} / 2)`;
            });

            // 5. 💥 매칭 성사 완료 신호 수신 (아레나 텔레포트)
            socket.on('matchFound', (data) => {
                currentRoomId = data.roomId;
                myRole = data.role;
                opponentId = data.opponent;
                gameMode = 'match';

                gameStatusEl.innerText = "1v1 매치 아레나";
                gameStatusEl.className = "text-xl font-black text-rose-500 animate-pulse";
                versusContainer.classList.remove('opacity-0');

                // 진영 분산 순간이동(TP)
                if (myRole === 'p1') {
                    yawObject.position.set(0, PLAYER_HEIGHT, -22);
                } else {
                    yawObject.position.set(0, PLAYER_HEIGHT, -48);
                }
                player.hp = 100;
                updateHpUI(100, 100);
            });

            // 6. 상대방이 총을 쐈을 때 탄도 이펙트 시각화 수신
            socket.on('opponentShoot', (data) => {
                renderTracerEffect(data.start, data.end, 0xef4444);
            });

            // 7. 내가 데미지를 입었을 때
            socket.on('damaged', (data) => {
                player.hp = Math.max(0, player.hp - data.damage);
                updateHpUI(player.hp, null);

                damageIndicator.classList.add('damaged');
                setTimeout(() => damageIndicator.classList.remove('damaged'), 120);

                if (player.hp <= 0) {
                    // 패배 통보 처리
                    socket.emit('matchOver', { roomId: currentRoomId, winnerId: opponentId, loserId: socket.id });
                }
            });

            // 8. 최종 대결 승패 결과 정산 후 로비 송환
            socket.on('gameResult', (result) => {
                gameMode = 'lobby';
                versusContainer.classList.add('opacity-0');
                gameStatusEl.innerText = "대기실 (LOBBY)";
                gameStatusEl.className = "text-xl font-black text-amber-400";
                
                if(result === 'win') {
                    document.getElementById('score-win').innerText = parseInt(document.getElementById('score-win').innerText) + 1;
                    alert("👑 대결 승리! 라이벌을 꺾었습니다.");
                } else {
                    document.getElementById('score-lose').innerText = parseInt(document.getElementById('score-lose').innerText) + 1;
                    alert("💀 패배했습니다. 컨트롤을 연마하세요!");
                }

                // 로비로 강제 역스폰 복귀
                yawObject.position.set((Math.random() - 0.5) * 5, PLAYER_HEIGHT, 12);
                socket.emit('toggleReady', false); // 준비 해제 보장
            });

            // 9. 다른 유저 접속 끊김
            socket.on('playerDisconnected', (id) => {
                if (otherPlayers[id]) {
                    scene.remove(otherPlayers[id]);
                    delete otherPlayers[id];
                }
            });
        }

        // --- 맵 빌딩 및 상대 캐릭터 리소스 메싱 ---
        function buildMaps() {
            // 로비 및 아레나 바닥
            const lobbyFloor = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), new THREE.MeshStandardMaterial({ color: 0x1e293b }));
            lobbyFloor.rotation.x = -Math.PI / 2;
            scene.add(lobbyFloor);

            const arenaFloor = new THREE.Mesh(new THREE.BoxGeometry(40, 1, 40), new THREE.MeshStandardMaterial({ color: 0x0f172a }));
            arenaFloor.position.set(0, -0.5, -35);
            scene.add(arenaFloor);

            // 중앙 장애물 빌딩
            const obstacle = new THREE.Mesh(new THREE.BoxGeometry(6, 5, 6), new THREE.MeshStandardMaterial({ color: 0x475569 }));
            obstacle.position.set(0, 2.5, -35);
            scene.add(obstacle);

            // 1v1 매칭 발판 배치 (공동 중앙 수렴형)
            const padGeo = new THREE.CylinderGeometry(padRadius, padRadius, 0.1, 32);
            const padMat = new THREE.MeshStandardMaterial({ color: 0xf59e0b, emissive: 0xd97706, emissiveIntensity: 0.3 });
            
            myPad = new THREE.Mesh(padGeo, padMat);
            myPad.position.set(0, 0.05, 5); // 이 발판 위에 두명 다 올라서면 매칭 조건 충족 시뮬레이션
            scene.add(myPad);
        }

        function createRemotePlayerMesh(id, pos) {
            const group = new THREE.Group();
            // 몸통
            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1.8, 0.6), new THREE.MeshStandardMaterial({ color: 0xef4444 }));
            body.position.y = 0.9;
            group.add(body);
            // 머리 (헤드샷 판정용 박스 히트맵핑 적용 가능)
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.7), new THREE.MeshStandardMaterial({ color: 0xfacc15 }));
            head.position.y = 2.1;
            head.userData = { targetId: id, isHead: true };
            group.add(head);

            body.userData = { targetId: id, isHead: false };

            group.position.copy(pos);
            scene.add(group);
            otherPlayers[id] = group;
        }

        function createPlayerWeapon() {
            gunGroup = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.15, 1.0), new THREE.MeshStandardMaterial({ color: 0x334155 }));
            gunGroup.add(body);
            gunGroup.position.set(0.25, -0.2, -0.4);
            camera.add(gunGroup);
        }

        // --- 조작 및 키 리스너 (점프 추가) ---
        function onKeyDown(e) {
            keys[e.code] = true;

            // 🦘 [스페이스바] 점프 메커니즘 발동 구현
            if (e.code === 'Space' && player.isGrounded && isLocked) {
                player.velocity.y = JUMP_FORCE;
                player.isGrounded = false;
            }

            if (e.code === 'KeyR' && player.ammo < player.maxAmmo && !player.isReloading) {
                reloadWeapon();
            }
        }

        function onKeyUp(e) { keys[e.code] = false; }

        function onMouseMove(e) {
            if (!isLocked) return;
            yawObject.rotation.y -= e.movementX * 0.0022;
            pitchObject.rotation.x -= e.movementY * 0.0022;
            pitchObject.rotation.x = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitchObject.rotation.x));
        }

        function reloadWeapon() {
            player.isReloading = true;
            setTimeout(() => {
                player.ammo = player.maxAmmo;
                currentAmmoEl.innerText = player.ammo;
                player.isReloading = false;
            }, 1200);
        }

        function updateHpUI(myHp, enemyHp) {
            if(myHp !== null) {
                myHpBar.style.width = myHp + '%';
                myHpText.innerText = `${myHp} HP`;
            }
        }

        // --- 실시간 레이캐스트 사격 및 명중 네트워킹 트래커 ---
        function fireActiveWeapon() {
            if (!isLocked || player.isReloading) return;
            const now = performance.now();
            if (now - player.lastShotTime < player.shootDelay) return;

            player.lastShotTime = now;
            player.ammo--;
            currentAmmoEl.innerText = player.ammo;

            // 레이캐스팅 정중앙 조준 사격 처리
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);

            // 탄도 라인 연산을 위한 출발 원점 좌표 추출
            const startVec = new THREE.Vector3(0.15, -0.15, -0.4).unproject(camera);
            let endVec = new THREE.Vector3();
            raycaster.ray.at(100, endVec);

            // 히트 스캔 필터링 대상 추출
            const targetMeshes = [];
            Object.values(otherPlayers).forEach(p => {
                p.traverse(child => { if(child.isMesh) targetMeshes.push(child); });
            });

            const intersects = raycaster.intersectObjects(targetMeshes);
            if (intersects.length > 0) {
                const hit = intersects[0];
                endVec.copy(hit.point);

                // 상대방 타격 성공 시 네트워크 데미지 브로드캐스팅 패킷 송신
                if (gameMode === 'match' && hit.object.userData.targetId) {
                    const isHead = hit.object.userData.isHead;
                    const dmg = isHead ? 45 : 15; // 헤드샷 가산 배율 차등 적용
                    
                    socket.emit('hitPlayer', {
                        targetId: hit.object.userData.targetId,
                        damage: dmg
                    });
                }
            }

            // 내 화면에 소총 탄막 흔적 그리기
            renderTracerEffect(startVec, endVec, 0xf59e0b);

            // 실시간 다른 접속자들에게 내가 총을 쐈음을 서버로 릴레이
            socket.emit('shoot', { start: startVec, end: endVec });
        }

        function renderTracerEffect(start, end, colorHex) {
            const mat = new THREE.LineBasicMaterial({ color: colorHex, transparent: true, opacity: 0.7 });
            const geo = new THREE.BufferGeometry().setFromPoints([start, end]);
            const line = new THREE.Line(geo, mat);
            scene.add(line);
            setTimeout(() => { scene.remove(line); geo.dispose(); mat.dispose(); }, 50);
        }

        // --- 루프 업데이트 연산 및 중력 가속도 물리 연산 (점프) ---
        function updatePhysicsAndMovement() {
            // 1. 🦘 중력 및 점프 물리 공식 연산 가동
            if (!player.isGrounded) {
                player.velocity.y -= GRAVITY; // 매 프레임 아래로 끌어내리는 가속도 낙하 적용
                yawObject.position.y += player.velocity.y;

                // 바닥 착지 타일 하한선 기준값 충돌 검사 제어
                if (yawObject.position.y <= PLAYER_HEIGHT) {
                    yawObject.position.y = PLAYER_HEIGHT;
                    player.velocity.y = 0;
                    player.isGrounded = true;
                }
            }

            if (!isLocked) return;

            // 2. 키보드 수평 방향 벡터 무빙 이동 연산
            const moveDir = new THREE.Vector3();
            if (keys['KeyW']) moveDir.z -= 1;
            if (keys['KeyS']) moveDir.z += 1;
            if (keys['KeyA']) moveDir.x -= 1;
            if (keys['KeyD']) moveDir.x += 1;
            moveDir.normalize();

            const rotatedDir = moveDir.clone().applyQuaternion(yawObject.quaternion);
            rotatedDir.y = 0;
            rotatedDir.normalize();

            yawObject.position.addScaledVector(rotatedDir, PLAYER_SPEED);

            // 구역 이탈 제한 벽면 충돌 박스 컬링
            if (gameMode === 'lobby') {
                yawObject.position.x = Math.max(-14, Math.min(14, yawObject.position.x));
                yawObject.position.z = Math.max(-14, Math.min(14, yawObject.position.z));

                // 3. 밟았을 때 매칭 대기열 토글 진입 연산
                const distToPad = new THREE.Vector2(yawObject.position.x, yawObject.position.z).distanceTo(new THREE.Vector2(myPad.position.x, myPad.position.z));
                const isOnPad = distToPad < padRadius;
                
                // 로컬 상태와 서버 발판 동기화 상태가 다를 때 한번만 전송
                if (isOnPad && !player.isReadyState) {
                    player.isReadyState = true;
                    socket.emit('toggleReady', true);
                } else if (!isOnPad && player.isReadyState) {
                    player.isReadyState = false;
                    socket.emit('toggleReady', false);
                }
            }

            // 내 최신 위치 데이터를 매 프레임 실시간 노드로 중계 패킷 전송
            socket.emit('playerMovement', {
                pos: yawObject.position,
                rotY: yawObject.rotation.y
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            updatePhysicsAndMovement();
            if (player.isShooting) fireActiveWeapon();
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.onload = () => { init(); animate(); };
    </script>
</body>
</html>
